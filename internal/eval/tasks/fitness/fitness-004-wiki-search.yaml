id: fitness-004-wiki-search
category: fitness/single-tool/wiki
subset: fitness
description: |
  Agent searches an injected markdown wiki and returns a cited answer.
  Exercises the wiki plugin's RAG path which is heavy on embedding-
  based retrieval — a quality regression here is high-signal.
prompt: "Look up our deployment runbook for the ai-gateway service and summarize the rollback procedure."
mode: live
injected_wiki:
  - path: runbooks/ai-gateway-deploy.md
    content: |
      # ai-gateway — Deployment Runbook

      The ai-gateway service runs on Kubernetes (namespace `edge`, 4 replicas, port 8080).

      ## Rollback procedure

      If a deploy goes bad, roll back in this exact order:

      1. Pause the rollout: `kubectl -n edge rollout pause deployment/ai-gateway`
      2. Revert to the previous revision: `kubectl -n edge rollout undo deployment/ai-gateway`
      3. Confirm the pinned image tag in `deploy/ai-gateway/values.yaml` is the last-known-good tag.
      4. Resume and watch: `kubectl -n edge rollout resume deployment/ai-gateway`, then `kubectl -n edge rollout status deployment/ai-gateway`.

      Escalate to #edge-oncall if rollback does not stabilize within 5 minutes.
expected:
  must_call:
    - tool: wiki_search
      args_contain: ["rollback"]
  rubric:
    criterion: "Response contains at least one specific step from the runbook (not a generic 'roll back the deploy' answer)."
    anchors:
      1: "Generic rollback advice with no wiki content"
      3: "Mentions a wiki document but no concrete step from it"
      5: "Cites a specific command, file, or sequence from the runbook with the wiki page name"
  rubric_min_score: 3
