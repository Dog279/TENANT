{{define "toolrow"}}<div class="trow" id="tool-{{.Name}}">
  <span class="nm">{{.Name}}</span>
  {{if .Gated}}<span class="risk">⚠ destructive</span>{{end}}
  <span class="sp"></span>
  <button type="button" class="btn sm{{if .Enabled}} on{{end}}"
    data-on:click="@post('/tools/{{.Name}}/toggle?enabled={{if .Enabled}}false{{else}}true{{end}}')">{{if .Enabled}}on{{else}}off{{end}}</button>
</div>{{end}}
